<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#1a0f24"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="270" fill="url(#bg3)"/>
  <!-- Neural network glow -->
  <circle cx="240" cy="130" r="120" fill="url(#core)"/>
  <!-- Central node -->
  <circle cx="240" cy="120" r="18" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="2"/>
  <circle cx="240" cy="120" r="8" fill="#6366f1" opacity="0.7"/>
  <circle cx="240" cy="120" r="3" fill="#fff" opacity="0.8"/>
  <!-- First ring nodes -->
  <circle cx="160" cy="80" r="10" fill="#0ad3ff" opacity="0.15" stroke="#0ad3ff" stroke-width="1.5"/>
  <circle cx="160" cy="80" r="5" fill="#0ad3ff" opacity="0.6"/>
  <circle cx="320" cy="80" r="10" fill="#0ad3ff" opacity="0.15" stroke="#0ad3ff" stroke-width="1.5"/>
  <circle cx="320" cy="80" r="5" fill="#0ad3ff" opacity="0.6"/>
  <circle cx="160" cy="170" r="10" fill="#ff5b94" opacity="0.15" stroke="#ff5b94" stroke-width="1.5"/>
  <circle cx="160" cy="170" r="5" fill="#ff5b94" opacity="0.6"/>
  <circle cx="320" cy="170" r="10" fill="#ff5b94" opacity="0.15" stroke="#ff5b94" stroke-width="1.5"/>
  <circle cx="320" cy="170" r="5" fill="#ff5b94" opacity="0.6"/>
  <!-- Second ring nodes -->
  <circle cx="100" cy="50" r="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <circle cx="100" cy="50" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="380" cy="50" r="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <circle cx="380" cy="50" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="90" cy="190" r="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <circle cx="90" cy="190" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="390" cy="190" r="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <circle cx="390" cy="190" r="3" fill="rgba(255,255,255,0.4)"/>
  <!-- Connections from center -->
  <g stroke="rgba(99,102,241,0.12)" stroke-width="1">
    <line x1="240" y1="120" x2="160" y2="80"/>
    <line x1="240" y1="120" x2="320" y2="80"/>
    <line x1="240" y1="120" x2="160" y2="170"/>
    <line x1="240" y1="120" x2="320" y2="170"/>
  </g>
  <!-- Connections to outer ring -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="0.8">
    <line x1="160" y1="80" x2="100" y2="50"/>
    <line x1="320" y1="80" x2="380" y2="50"/>
    <line x1="160" y1="170" x2="90" y2="190"/>
    <line x1="320" y1="170" x2="390" y2="190"/>
  </g>
  <g stroke="rgba(99,102,241,0.08)" stroke-width="0.8">
    <line x1="160" y1="80" x2="90" y2="190"/>
    <line x1="320" y1="80" x2="390" y2="190"/>
    <line x1="160" y1="170" x2="100" y2="50"/>
    <line x1="320" y1="170" x2="380" y2="50"/>
  </g>
  <!-- Animated pulse rings -->
  <circle cx="240" cy="120" r="30" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.3"/>
  <circle cx="240" cy="120" r="50" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.15"/>
  <text x="240" y="248" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.2)" letter-spacing="2">AI FEATURES · NO DATA SCIENCE TEAM</text>
</svg>
